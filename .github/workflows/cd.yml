name: Build and Deploy to Docker Hub

on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Check Out Repo
      uses: actions/checkout@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v1

      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push backend image
      uses: docker/build-push-action@v2
      with:
        context: .
        file: docker/backend/Dockerfile
        push: true
        tags: nagmani001/codeforces-backend:latest

    - name: Build and Push web image
      uses: docker/build-push-action@v2
      with:
        context: .
        file: docker/web/Dockerfile
        push: true
        tags: nagmani001/codeforces-web:latest

    - name: Verify Pushed Image
      run: docker pull nagmani001/codeforces-web:latest

    - name: Verify Pushed Image
      run: docker pull nagmani001/codeforces-backend:latest

    - name: Deploy using compose to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          sudo docker pull nagmani001/codeforces-backend:latest
          sudo docker pull nagmani001/codeforces-web:latest
          sudo docker stop backend || true
          sudo docker rm backend || true
          sudo docker stop web || true
          sudo docker rm web || true
          sudo docker compose -f ./docker/docker-compose.yml up -d --wait  
