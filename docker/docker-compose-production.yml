services:
  database:
    image: postgres
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=nagmani
    ports:
      - '5433:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 1s
      timeout: 10s
      retries: 10 

  redis:
    image: redis
    container_name: redis
    ports:
      - 6379:6379 
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 10s
      retries: 10 

  backend:
    container_name: backend
    build:
      context: ../
      dockerfile: docker/backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:nagmani@database:5432/postgres
      - REDIS_URL=redis://redis:6379
    env_file:
      - ../apps/backend/.env.prod
    ports:
      - 3001:3001
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    container_name: worker
    build:
      context: ../
      dockerfile: docker/worker/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  web:
    container_name: web
    build:
      context: ../
      dockerfile: docker/web/Dockerfile
    ports:
      - 4000:4000

